services:
  - type: web
    name: velqora-api-staging
    env: docker
    dockerfilePath: apps/api/Dockerfile
    autoDeploy: true
    plan: starter
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: API_PORT
        value: "4000"
      - key: API_HOST
        value: 0.0.0.0
      - key: PUBLIC_API_BASE_URL
        value: https://staging.quantex25.app
      - key: SENTRY_DSN
        sync: false
      - key: SENTRY_ENVIRONMENT
        value: staging
      - key: SENTRY_TRACES_SAMPLE_RATE
        value: "0.1"
      - key: TRUST_PROXY_HOPS
        value: "1"
      - key: MOBILE_APP_ORIGIN
        value: https://staging.quantex25.app
      - key: DATABASE_URL
        fromDatabase:
          name: velqora-postgres-staging
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: velqora-redis-staging
          property: connectionString
      - key: OTP_PROVIDER
        value: resend
      - key: DEBUG_OTP_EXPOSURE
        value: "false"
      - key: OTP_EMAIL_FROM
        value: Velqora <noreply@staging.quantex25.app>
      - key: RESEND_API_KEY
        sync: false
      - key: STATUS_ENDPOINT_ENABLED
        value: "true"
      - key: METRICS_ENDPOINT_ENABLED
        value: "false"
      - key: OTP_HASH_SECRET
        sync: false
      - key: ALERTS_WEBHOOK_URL
        sync: false
      - key: ALERTS_COOLDOWN_SECONDS
        value: "60"
      - key: SLO_MONITOR_ENABLED
        value: "true"
      - key: SLO_MONITOR_WINDOW_SECONDS
        value: "300"
      - key: SLO_MONITOR_EVALUATION_SECONDS
        value: "30"
      - key: SLO_HTTP_5XX_RATE_THRESHOLD_PERCENT
        value: "2"
      - key: SLO_HTTP_5XX_MIN_REQUESTS
        value: "100"
      - key: SLO_OTP_DELIVERY_FAILURE_THRESHOLD
        value: "5"
      - key: AUTH_OTP_TTL_SECONDS
        value: "300"
      - key: AUTH_MAX_OTP_ATTEMPTS
        value: "5"
      - key: AUTH_SESSION_TTL_DAYS
        value: "30"
      - key: AUTH_MAX_ACTIVE_SESSIONS
        value: "5"
      - key: AUTH_RATE_LIMIT_WINDOW_SECONDS
        value: "900"
      - key: AUTH_RATE_LIMIT_MAX_REQUEST_OTP
        value: "5"
      - key: AUTH_RATE_LIMIT_MAX_VERIFY_OTP
        value: "10"
      - key: SMS_IMPORT_SCAN_ENABLED
        value: "false"
      - key: SMS_DISCLOSURE_VERSION
        value: sms_disclosure_v1
      - key: APP_CURRENCY
        value: INR
      - key: GOOGLE_OAUTH_ENABLED
        value: "false"
  - type: redis
    name: velqora-redis-staging
    plan: starter

databases:
  - name: velqora-postgres-staging
    plan: starter
    databaseName: velqora
    user: velqora
