name: Semgrep SAST

on:
  schedule:
    - cron: "0 4 * * 1" # 04:00 UTC every Monday
  workflow_dispatch:
  # push/PR deliberately omitted — CodeQL covers on-commit SAST.
  # Semgrep runs weekly for its Node/OWASP/JWT rulesets depth scan.

permissions:
  contents: read
  security-events: write

jobs:
  semgrep:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # Skip on dependabot PRs — semgrep token won't be available
    if: github.actor != 'dependabot[bot]'

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Semgrep scan
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/src" \
            -w /src \
            -e SEMGREP_APP_TOKEN \
            semgrep/semgrep:latest \
            semgrep scan \
              --config p/nodejs \
              --config p/typescript \
              --config p/jwt \
              --config p/owasp-top-ten \
              --config p/secrets \
              --sarif \
              --output semgrep.sarif \
              --error
        env:
          SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN }}

      - name: Upload results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: semgrep.sarif
          category: semgrep
