name: Dependency Audit

on:
  schedule:
    - cron: "0 5 * * *" # 05:00 UTC daily
  workflow_dispatch:

permissions:
  contents: read

jobs:
  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PNPM
        uses: pnpm/action-setup@v4
        with:
          version: 10.28.1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run pnpm audit
        run: pnpm audit --prod --json > audit-report.json || true

      - name: Fail on high or critical vulnerabilities
        run: |
          HIGH=$(python3 -c "
          import json
          try:
            data = json.load(open('audit-report.json'))
            vulns = data.get('metadata', {}).get('vulnerabilities', {})
            print(vulns.get('high', 0) + vulns.get('critical', 0))
          except Exception:
            print(0)
          ")
          echo "High/Critical vulnerabilities found: $HIGH"
          if [ "$HIGH" -gt "0" ]; then
            echo "::error::$HIGH high or critical vulnerabilities detected. Run 'pnpm audit' locally for details."
            exit 1
          fi
          echo "No high or critical vulnerabilities found."
