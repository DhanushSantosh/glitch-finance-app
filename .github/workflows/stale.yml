name: Stale Issues and PRs

on:
  schedule:
    - cron: "0 2 * * *" # 02:00 UTC daily
  workflow_dispatch:

permissions:
  issues: write
  pull-requests: write

jobs:
  stale:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Mark and close stale items
        uses: actions/stale@v9
        with:
          stale-issue-message: >
            This issue has been inactive for 30 days and has been marked stale.
            It will be closed in 7 days unless there is further activity.
          stale-pr-message: >
            This PR has been inactive for 21 days and has been marked stale.
            It will be closed in 7 days unless there is further activity.
          close-issue-message: >
            Closing due to inactivity. Feel free to reopen if this is still relevant.
          close-pr-message: >
            Closing due to inactivity. Feel free to reopen when you're ready to continue.
          days-before-issue-stale: 30
          days-before-pr-stale: 21
          days-before-issue-close: 7
          days-before-pr-close: 7
          stale-issue-label: stale
          stale-pr-label: stale
          exempt-issue-labels: pinned,security,blocked
          exempt-pr-labels: pinned,security,do-not-close
          operations-per-run: 100
