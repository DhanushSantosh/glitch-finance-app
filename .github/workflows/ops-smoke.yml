name: ops-smoke

on:
  workflow_dispatch:
    inputs:
      api_base_url:
        description: "API base URL to test (for example: https://staging-api.example.com)"
        required: true
        type: string
      smoke_test_email:
        description: "Email used for OTP request in smoke checks"
        required: false
        default: "smoke-check@example.com"
        type: string
      run_perf:
        description: "Run performance smoke checks after staging smoke"
        required: true
        default: false
        type: boolean
      perf_iterations:
        description: "Performance smoke iterations"
        required: false
        default: "20"
        type: string
      perf_p95_threshold_ms:
        description: "p95 threshold in milliseconds"
        required: false
        default: "300"
        type: string

jobs:
  staging-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.28.1

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run staging smoke checks
        env:
          API_BASE_URL: ${{ inputs.api_base_url }}
          SMOKE_TEST_EMAIL: ${{ inputs.smoke_test_email }}
          SMOKE_BEARER_TOKEN: ${{ secrets.SMOKE_BEARER_TOKEN }}
        run: pnpm smoke:staging

  perf-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: staging-smoke
    if: ${{ inputs.run_perf }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.28.1

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run performance smoke checks
        env:
          API_BASE_URL: ${{ inputs.api_base_url }}
          PERF_BEARER_TOKEN: ${{ secrets.SMOKE_BEARER_TOKEN }}
          PERF_ITERATIONS: ${{ inputs.perf_iterations }}
          PERF_P95_THRESHOLD_MS: ${{ inputs.perf_p95_threshold_ms }}
        run: pnpm smoke:perf
