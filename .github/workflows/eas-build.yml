name: EAS Mobile Build

on:
  workflow_dispatch:
    inputs:
      profile:
        description: Build profile
        required: true
        default: preview
        type: choice
        options:
          - development
          - preview
          - production
      platform:
        description: Target platform
        required: true
        default: all
        type: choice
        options:
          - all
          - android
          - ios

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PNPM
        uses: pnpm/action-setup@v4
        with:
          version: 10.28.1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Setup Expo
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Build
        working-directory: apps/mobile
        env:
          BUILD_PROFILE: ${{ inputs.profile }}
          BUILD_PLATFORM: ${{ inputs.platform }}
        run: eas build --profile "$BUILD_PROFILE" --platform "$BUILD_PLATFORM" --non-interactive
